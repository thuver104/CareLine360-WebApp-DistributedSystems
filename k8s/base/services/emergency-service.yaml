apiVersion: apps/v1
kind: Deployment
metadata:
  name: emergency-service
  namespace: careline360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emergency-service
  template:
    metadata:
      labels:
        app: emergency-service
    spec:
      containers:
        - name: emergency-service
          image: careline360/emergency-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5006
          envFrom:
            - configMapRef:
                name: careline360-config
            - secretRef:
                name: careline360-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: emergency-service
  namespace: careline360
spec:
  selector:
    app: emergency-service
  ports:
    - port: 5006
      targetPort: 5006
      protocol: TCP

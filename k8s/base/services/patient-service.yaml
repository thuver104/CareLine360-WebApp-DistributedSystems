apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: careline360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: careline360/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: careline360-config
            - secretRef:
                name: careline360-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: careline360
spec:
  selector:
    app: patient-service
  ports:
    - port: 5002
      targetPort: 5002
      protocol: TCP

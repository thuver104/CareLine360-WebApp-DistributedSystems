apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: careline360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: careline360/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1111
          envFrom:
            - configMapRef:
                name: careline360-config
            - secretRef:
                name: careline360-secrets
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: PATIENT_SERVICE_URL
              value: http://patient-service:5002
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service:5003
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service:5004
            - name: ADMIN_SERVICE_URL
              value: http://admin-service:5005
            - name: EMERGENCY_SERVICE_URL
              value: http://emergency-service:5006
          readinessProbe:
            httpGet:
              path: /health
              port: 1111
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 1111
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: careline360
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 1111
      targetPort: 1111
      nodePort: 31111
      protocol: TCP

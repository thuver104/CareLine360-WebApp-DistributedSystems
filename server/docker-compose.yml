# ==================== Networks ====================

networks:
  careline-network:
    driver: bridge

# ==================== Volumes ====================

volumes:
  mongo-auth-data:
  mongo-patient-data:
  mongo-doctor-data:
  mongo-appointment-data:
  mongo-emergency-data:
  mongo-notification-data:
  rabbitmq-data:
  rabbitmq-logs:

version: '3.8'

services:
  # ==================== MongoDB Databases ====================
  # Each microservice has its own database instance
  
  mongo-auth:
    image: mongo:7
    container_name: careline-mongo-auth
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_auth_db
    networks:
      - careline-network

  mongo-patient:
    image: mongo:7
    container_name: careline-mongo-patient
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-patient-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_patient_db
    networks:
      - careline-network

  mongo-doctor:
    image: mongo:7
    container_name: careline-mongo-doctor
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo-doctor-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_doctor_db
    networks:
      - careline-network

  mongo-appointment:
    image: mongo:7
    container_name: careline-mongo-appointment
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - mongo-appointment-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_appointment_db
    networks:
      - careline-network

  mongo-emergency:
    image: mongo:7
    container_name: careline-mongo-emergency
    restart: unless-stopped
    ports:
      - "27021:27017"
    volumes:
      - mongo-emergency-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_emergency_db
    networks:
      - careline-network

  mongo-notification:
    image: mongo:7
    container_name: careline-mongo-notification
    restart: unless-stopped
    ports:
      - "27022:27017"
    volumes:
      - mongo-notification-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careline_notification_db
    networks:
      - careline-network

  # ==================== RabbitMQ Message Broker ====================
  
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: careline-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP protocol port
      - "15672:15672"    # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    networks:
      - careline-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

